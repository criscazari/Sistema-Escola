<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Etec Ilha Solteira - Sistema de Inventário</title>
    <link rel="icon" type="image/png" href="./icoEtec.png">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/@ericblade/quagga2/dist/quagga.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

    <style>
        :root {
            --primary-color: #b30000;
            /* Vermelho institucional Centro Paula Souza */
            --dark-color: #2c3e50;
            --light-color: #f4f6f9;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--light-color);
            color: #333;
            padding: 20px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
            overflow-x: auto;
        }

        /* CONTAINER DOS BOTÕES DE LOGIN - ALINHAMENTO CENTRAL */
        .botoes-login-container {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 15px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            background: white;
            min-width: 800px;
        }

        h2 {
            margin-bottom: 15px;
            color: var(--dark-color);
            border-bottom: 2px solid var(--primary-color);
            padding-bottom: 5px;
        }

        .form-group {
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
        }

        label {
            font-weight: bold;
            margin-bottom: 5px;
        }

        input,
        select,
        textarea {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 16px;
        }

        .btn {
            background-color: var(--primary-color);
            color: white;
            padding: 10px 15px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn:hover {
            background-color: #800000;
        }

        .btn-sec {
            background-color: var(--dark-color);
        }

        .btn-sec:hover {
            background-color: #1a252f;
        }

        .row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 15px;
        }

        /* Estilização da janela do Scanner adaptada para a QuaggaJS */
        #reader {
            width: 100%;
            max-width: 500px;
            height: 280px;
            margin: 15px auto;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            position: relative;
        }

        /* O elemento de vídeo gerado pela Quagga se ajustará aqui */
        #reader video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Desenha uma linha de mira vermelha central para ajudar o usuário a alinhar o código */
        #reader::after {
            content: "";
            position: absolute;
            top: 50%;
            left: 5%;
            width: 90%;
            height: 2px;
            background-color: red;
            box-shadow: 0 0 4px red;
            z-index: 10;
        }

        th,
        td {
            border: 1px solid #ddd;
            padding: 12px;
            text-align: left;
        }

        th {
            background-color: var(--dark-color);
            color: white;
        }

        tr:nth-child(even) {
            background-color: #f9f9f9;
        }

        /* Estilo da faixa vermelha do cabeçalho */
        .header-container {
            background-color: #aa0000;
            color: white;
            padding: 30px 15px;
            position: relative;
            text-align: center;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        /* Título Principal */
        .header-title {
            margin: 0;
            font-size: 40px;
        }

        /* Subtítulo */
        .header-subtitle {
            margin: 8px 0 0 0;
            font-size: 24px;
        }

        /* Container do Usuário (Canto Superior Direito) */
        .user-container {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            right: 25px;
            font-size: 16px;
            display: none;
        }

        .user-name {
            font-weight: bold;
        }

        .btn-sair {
            color: white;
            margin-left: 8px;
            text-decoration: underline;
        }

        @media (max-width: 768px) {
            .header-container {
                padding-top: 60px;
            }

            .header-title {
                font-size: 24px;
            }

            .header-subtitle {
                font-size: 15px;
            }

            .user-container {
                top: 15px;
                transform: none;
                right: 0;
                width: 100%;
                text-align: center;
            }
        }

        @media print {
            body {
                background: white;
                padding: 0;
            }

            .no-print {
                display: none !important;
            }

            .card {
                box-shadow: none;
                padding: 0;
            }

            th {
                background-color: #333 !important;
                color: white !important;
            }
        }
    </style>
</head>

<body>

    <div class="header-container">
        <h1 class="header-title">Etec de Ilha Solteira</h1>
        <p class="header-subtitle">Sistema de Catalogação e Inventário de Bens</p>

        <div id="usuarioContainer" class="user-container">
            Olá, <span id="nomeUsuario" class="user-name"></span> |
            <a href="#" id="btnSair" class="btn-sair">Sair</a>
        </div>
    </div>

    <div id="loginScreen" class="card" style="max-width:400px; margin:50px auto;">
        <h2>Login do Sistema</h2>
        <div class="form-group">
            <label>E-mail</label>
            <input type="email" id="loginEmail">
        </div>
        <div class="form-group">
            <label>Senha</label>
            <input type="password" id="loginPassword">
        </div>

        <div class="botoes-login-container">
            <button class="btn" onclick="login()">
                Entrar
            </button>
            <button class="btn btn-sec" type="button" onclick="criarConta()">
                Nova Conta
            </button>
        </div>
    </div>

    <div class="container" id="mainSystem" style="display:none;">

        <div class="card no-print">
            <h2>Cadastrar Novo Item</h2>
            <form id="itemForm">
                <div class="row">
                    <div class="form-group">
                        <label for="itemName">Nome do Item/Produto*</label>
                        <input type="text" id="itemName" required placeholder="Ex: Monitor Dell 24'">
                    </div>
                    <div class="form-group">
                        <label for="itemCategory">Categoria*</label>
                        <select id="itemCategory" required>
                            <option value="">Selecione...</option>
                            <option value="Informática">Informática</option>
                            <option value="Mobiliário">Mobiliário</option>
                            <option value="Eletrodomésticos">Eletrodomésticos</option>
                            <option value="Outros">Outros</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="itemStatus">Status*</label>
                        <select id="itemStatus" required>
                            <option value="">Selecione...</option>
                            <option value="Em uso">Em uso</option>
                            <option value="Condicionado">Condicionado</option>
                            <option value="Dar baixa">Dar baixa</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="itemLocation">Local*</label>
                        <select id="itemLocation" required>
                            <option value="">Selecione...</option>
                            <option value="Almoxarifado - Sede">Almoxarifado - Sede</option>
                            <option value="Anfiteatro - Sede">Anfiteatro - Sede</option>
                            <option value="Apoio Adm. (Suman / Dani) - Sede">Apoio Adm. (Suman / Dani) - Sede</option>
                            <option value="Biblioteca - Sede">Biblioteca - Sede</option>
                            <option value="Cozinha/Refeitório - Sede">Cozinha/Refeitório - Sede</option>
                            <option value="Direção / Dir. Serviços - Sede">Direção / Dir. Serviços - Sede</option>
                            <option value="Hall de Entrada / Patio - Sede">Hall de Entrada / Patio - Sede</option>
                            <option value="Infra. TI - Sede">Infra. TI - Sede</option>
                            <option value="Lab. Elétrica - Sede">Lab. Elétrica - Sede</option>
                            <option value="Lab. Enfermagem - Sede">Lab. Enfermagem - Sede</option>
                            <option value="Lab. Hardware - Sede">Lab. Hardware - Sede</option>
                            <option value="Lab. Informática 1 - Sede">Lab. Informática 1 - Sede</option>
                            <option value="Lab. Informática 2 - Sede">Lab. Informática 2 - Sede</option>
                            <option value="Lab. Informática 3 - Sede">Lab. Informática 3 - Sede</option>
                            <option value="Lab. Informática 4 - Sede">Lab. Informática 4 - Sede</option>
                            <option value="Lab. Informática Móvel - Sede">Lab. Informática Móvel - Sede</option>
                            <option value="Lab. Mecânica - Sede">Lab. Mecânica - Sede</option>
                            <option value="Lab. Química - Sede">Lab. Química - Sede</option>
                            <option value="Protocolo - Sede">Protocolo - Sede</option>
                            <option value="Sala Antigo Servidor / Arquivo Morto">Sala Antigo Servidor / Arquivo Morto
                            </option>
                            <option value="Sala ATA - Sede">Sala ATA - Sede</option>
                            <option value="Sala de Aula - Sede">Sala de Aula - Sede</option>
                            <option value="Sala de Coordenação - Sede">Sala de Coordenação - Sede</option>
                            <option value="Sala de Desenho - Sede">Sala de Desenho - Sede</option>
                            <option value="Sala de Vídeo - Sede">Sala de Vídeo - Sede</option>
                            <option value="Sala dos Docentes - Sede">Sala dos Docentes - Sede</option>
                            <option value="Sala Grêmio - Sede">Sala Grêmio - Sede</option>
                            <option value="Sala Maker - Sede">Sala Maker - Sede</option>
                            <option value="Sala Servidor - Sede">Sala Servidor - Sede</option>
                            <option value="Secretaria - Sede">Secretaria - Sede</option>
                            <option value="Sala de Aula - CD Urubu">Sala de Aula - CD Urubu</option>
                            <option value="Lab. Informática - CD Urubu">Lab. Informática - CD Urubu</option>
                            <option value="Sala de Coordenação - CD Urubu">Sala de Coordenação - CD Urubu</option>
                            <option value="Lab. Informática - CD Pereira Barreto">Lab. Informática - CD Pereira Barreto
                            </option>
                            <option value="Sala de Coordenação - CD Pereira Barreto">Sala de Coordenação - CD Pereira
                                Barreto</option>
                            <option value="Lab. Informática - CD Sud Mennucci">Lab. Informática - CD Sud Mennucci
                            </option>
                        </select>
                    </div>
                </div>

                <div class="row" style="margin-top: 10px;">
                    <div class="form-group">
                        <label style="flex-direction: row; gap: 10px; cursor: pointer;">
                            <input type="checkbox" id="hasPatrimony" onchange="togglePatrimonyFields()"> Possui
                            Patrimônio / Código de Barras?
                        </label>
                    </div>
                </div>

                <div id="patrimonyFields" class="row" style="display: none;">
                    <div class="form-group">
                        <label for="patrimonyCode">Número do Patrimônio</label>
                        <input type="text" id="patrimonyCode" placeholder="Ex: ETEC-065-4321">
                    </div>
                    <div class="form-group">
                        <label for="barcode">Código de Barras</label>
                        <div style="display: flex; gap: 5px;">
                            <input type="text" id="barcode" style="flex: 1;"
                                placeholder="Aproxime o leitor ou use a câmera">
                            <button type="button" id="btnScanTrigger" class="btn btn-sec" onclick="startScanner()">📷
                                Ler</button>
                        </div>
                    </div>
                </div>

                <div id="reader" style="display: none;"></div>

                <div class="form-group" style="margin-top: 15px;">
                    <button type="submit" class="btn">Salvar Item no Banco de Dados</button>
                </div>
            </form>
        </div>

        <div class="card">
            <h2 class="no-print">Consulta de Itens e Relatórios</h2>

            <div class="row no-print" style="margin-bottom: 20px;">
                <div class="form-group">
                    <label for="searchQuery">Pesquisar por Nome, Local ou Códigos</label>
                    <input type="text" id="searchQuery" oninput="loadItems()" placeholder="Digite para buscar...">
                </div>
                <div class="form-group">
                    <label for="filterCategory">Filtrar por Categoria</label>
                    <select id="filterCategory" onchange="loadItems()">
                        <option value="">Todas</option>
                        <option value="Informática">Informática</option>
                        <option value="Mobiliário">Mobiliário</option>
                        <option value="Eletrodomésticos">Eletrodomésticos</option>
                        <option value="Outros">Outros</option>
                    </select>
                </div>
                <div class="form-group" style="justify-content: flex-end; flex-direction: row; gap: 10px;">
                    <button class="btn btn-sec" onclick="window.print()">🖨️ Imprimir Relatório</button>
                    <button class="btn btn-sec" style="background-color: #27ae60;" onclick="exportToJSON()">💾 Exportar
                        Backup</button>
                </div>
            </div>

            <table id="itemsTable">
                <thead>
                    <tr>
                        <th>Item/Produto</th>
                        <th>Categoria</th>
                        <th>Status</th>
                        <th>Local</th>
                        <th>Patrimônio</th>
                        <th>Código de Barras</th>
                        <th class="no-print">Ações</th>
                    </tr>
                </thead>
                <tbody id="itemsTableBody">
                </tbody>
            </table>
        </div>

    </div>

    <script>
        // ==========================================
        // MEDIDAS DE PROTEÇÃO DO CÓDIGO FONTE
        // ==========================================
        document.addEventListener('contextmenu', (event) => event.preventDefault());
        document.addEventListener('keydown', (event) => {
            if (event.key === 'F12' ||
                (event.ctrlKey && event.shiftKey && event.key === 'I') ||
                (event.ctrlKey && event.shiftKey && event.key === 'C') ||
                (event.ctrlKey && event.key === 'u') ||
                (event.ctrlKey && event.key === 'U')) {
                event.preventDefault();
            }
        });

        // ==========================================
        // CONFIGURAÇÃO DO FIREBASE
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyB9HtjLT4gGhCOV4RsFQ2cPipW6Y53kcug",
            authDomain: "sistemaescola-f74c2.firebaseapp.com",
            projectId: "sistemaescola-f74c2",
            storageBucket: "sistemaescola-f74c2.firebasestorage.app",
            messagingSenderId: "328152429744",
            appId: "1:328152429744:web:8a0b7985be8c9e25cd3775"
        };

        firebase.initializeApp(firebaseConfig);

        const db = firebase.firestore();
        const auth = firebase.auth();

        // GERENCIAMENTO DE SESSÃO: Desloga automaticamente ao fechar a aba
        auth.setPersistence(firebase.auth.Auth.Persistence.SESSION)
            .catch((error) => {
                console.error("Erro ao aplicar persistência de sessão:", error);
            });

        let isScanning = false;

        // ==========================================
        // LOGIN
        // ==========================================
        async function login() {
            const email = document.getElementById("loginEmail").value;
            const password = document.getElementById("loginPassword").value;

            if (!email || !password) {
                alert("⚠️ Por favor, informe o e-mail e a senha para entrar.");
                return;
            }

            try {
                await auth.signInWithEmailAndPassword(email, password);
            } catch (error) {
                alert("Erro ao entrar:\n\n" + error.message);
            }
        }

        // ==========================================
        // CADASTRO DE NOVA CONTA
        // ==========================================
        async function criarConta() {
            const email = document.getElementById("loginEmail").value;
            const password = document.getElementById("loginPassword").value;

            if (!email || !password) {
                alert("⚠️ Por favor, digite um e-mail e uma senha nos campos acima para cadastrar a nova conta.");
                return;
            }

            try {
                await auth.createUserWithEmailAndPassword(email, password);
                alert("✨ Conta criada com sucesso! O acesso foi liberado.");
            } catch (error) {
                if (error.code === 'auth/email-already-in-use') {
                    alert("⚠️ Este e-mail já está cadastrado no sistema!");
                } else if (error.code === 'auth/weak-password') {
                    alert("⚠️ A senha precisa ter pelo menos 6 caracteres.");
                } else {
                    alert("Erro ao criar conta:\n\n" + error.message);
                }
            }
        }

        document.addEventListener("keydown", function (event) {
            if (event.key === "Enter") {
                const loginScreen = document.getElementById("loginScreen");
                if (loginScreen && loginScreen.style.display !== "none") {
                    login();
                }
            }
        });

        function logout() {
            auth.signOut();
        }

        function togglePatrimonyFields() {
            const hasPatrimony = document.getElementById('hasPatrimony').checked;
            document.getElementById('patrimonyFields').style.display = hasPatrimony ? 'grid' : 'none';
            if (!hasPatrimony) stopScanner();
        }

        // Monitora o estado da autenticação
        auth.onAuthStateChanged((user) => {
            const container = document.getElementById('usuarioContainer');
            const txtNome = document.getElementById('nomeUsuario');

            if (user) {
                const nomeParaExibir = user.displayName || user.email.split('@')[0];
                if (txtNome) txtNome.textContent = nomeParaExibir;
                if (container) container.style.display = 'block';

                // Exibe o sistema principal e esconde o login
                if (document.getElementById("mainSystem")) document.getElementById("mainSystem").style.display = "block";
                if (document.getElementById("loginScreen")) document.getElementById("loginScreen").style.display = "none";

                loadItems();
            } else {
                if (container) container.style.display = 'none';
                if (document.getElementById("loginScreen")) document.getElementById("loginScreen").style.display = "block";
                if (document.getElementById("mainSystem")) document.getElementById("mainSystem").style.display = "none";
            }
        });

        document.getElementById('btnSair').addEventListener('click', (e) => {
            e.preventDefault();
            auth.signOut().then(() => {
                window.location.reload();
            }).catch((error) => {
                console.error("Erro ao sair:", error);
            });
        });

        // ==========================================
        // LÓGICA DO SCANNER (QUAGGA JS)
        // ==========================================
        function startScanner() {
            const readerElement = document.getElementById('reader');
            const btnTrigger = document.getElementById('btnScanTrigger');

            if (isScanning) {
                stopScanner();
                return;
            }

            readerElement.style.display = 'block';
            btnTrigger.innerText = "🛑 Parar";
            isScanning = true;

            Quagga.init({
                inputStream: {
                    name: "Live",
                    type: "LiveStream",
                    target: readerElement,
                    constraints: {
                        width: { ideal: 1280 },
                        height: { ideal: 720 },
                        facingMode: "environment"
                    },
                    singleChannel: false
                },
                locator: {
                    patchSize: "medium",
                    halfSample: true
                },
                numOfWorkers: 2,
                decoder: {
                    readers: ["code_128_reader", "code_39_reader"]
                },
                locate: true
            }, function (err) {
                if (err) {
                    console.error("Erro ao inicializar o Quagga:", err);
                    alert("Não foi possível acessar a câmera.");
                    stopScanner();
                    return;
                }
                Quagga.start();
            });

            Quagga.onDetected((data) => {
                if (!data || !data.codeResult) return;

                const decodedText = data.codeResult.code;
                tocarBip();

                document.getElementById('barcode').value = decodedText;
                document.getElementById('searchQuery').value = decodedText;

                stopScanner();
                loadItems();
            });
        }

        function stopScanner() {
            const readerElement = document.getElementById('reader');
            const btnTrigger = document.getElementById('btnScanTrigger');

            try {
                Quagga.stop();
            } catch (e) { }

            if (readerElement) readerElement.style.display = 'none';
            if (btnTrigger) btnTrigger.innerText = "📷 Ler";
            isScanning = false;
        }

        function tocarBip() {
            try {
                const AudioCtx = window.AudioContext || window.webkitAudioContext;
                if (!AudioCtx) return;
                const context = new AudioCtx();

                // CORREÇÃO: Adicione 'const' para que a variável pertença apenas a esta função
                const osc = context.createOscillator();

                osc.type = "sine";
                osc.frequency.setValueAtTime(1200, context.currentTime);
                osc.connect(context.destination);
                osc.start();
                osc.stop(context.currentTime + 0.08);
            } catch (e) { }
        }

        // ==========================================
        // SALVAR ITEM NO FIRESTORE (CREATE)
        // ==========================================
        document.getElementById('itemForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const nome = document.getElementById('itemName').value;
            const categoria = document.getElementById('itemCategory').value;
            const status = document.getElementById('itemStatus').value;
            const local = document.getElementById('itemLocation').value;
            const temPatrimonio = document.getElementById('hasPatrimony').checked;
            const patrimonio = temPatrimonio ? document.getElementById('patrimonyCode').value : "N/A";
            const codigoBarras = temPatrimonio ? document.getElementById('barcode').value : "N/A";

            if (temPatrimonio && patrimonio !== "N/A") {
                try {
                    const produtosRef = firebase.firestore().collection('itens');
                    const snapshot = await produtosRef.where('patrimonio', '==', patrimonio).get();

                    if (!snapshot.empty) {
                        alert(`Erro: O número de patrimônio "${patrimonio}" já está cadastrado em outro item.`);
                        return;
                    }
                } catch (erro) {
                    console.error("Erro ao verificar patrimônio existente:", erro);
                    alert("Erro ao validar o patrimônio. Tente novamente.");
                    return;
                }
            }

            try {
                await db.collection("itens").add({
                    nome: nome,
                    categoria: categoria,
                    status: status,
                    local: local,
                    temPatrimonio: temPatrimonio,
                    patrimonio: patrimonio,
                    codigoBarras: codigoBarras,
                    dataCadastro: new Date().toISOString().split('T')[0]
                });

                alert("Item saved successfully!");
                document.getElementById('itemForm').reset();
                loadItems(); // Recarrega a tabela após salvar
            } catch (error) {
                console.error("Erro ao salvar o item:", error);
                alert("Erro ao salvar o item no banco de dados.");
            }
        });

        // ==========================================
        // RECUPERAR E FILTRAR ITENS (READ & SEARCH)
        // ==========================================
        async function loadItems() {
            const queryText = document.getElementById('searchQuery').value.toLowerCase();
            const filterCategory = document.getElementById('filterCategory').value;
            const tbody = document.getElementById('itemsTableBody');

            if (!tbody) return;
            tbody.innerHTML = "<tr><td colspan='7'>Carregando itens...</td></tr>";

            try {
                let reference = db.collection("itens");

                if (filterCategory) {
                    reference = reference.where("categoria", "==", filterCategory);
                }

                const snapshot = await reference.get();
                tbody.innerHTML = "";

                if (snapshot.empty) {
                    tbody.innerHTML = "<tr><td colspan='7'>Nenhum item cadastrado ou encontrado.</td></tr>";
                    return;
                }

                snapshot.forEach(doc => {
                    const item = doc.data();
                    const id = doc.id;

                    const statusExibido = item.status || "Não Informado";
                    const localExibido = item.local || "Não Informado";
                    const patrimônioExibido = item.patrimonio || "N/A";
                    const codigoBarrasExibido = item.codigoBarras || "N/A";

                    if (item.nome.toLowerCase().includes(queryText) ||
                        localExibido.toLowerCase().includes(queryText) ||
                        patrimônioExibido.toLowerCase().includes(queryText) ||
                        codigoBarrasExibido.toLowerCase().includes(queryText)) {

                        const row = `
                            <tr>
                                <td><b>${item.nome}</b></td>
                                <td>${item.categoria}</td>
                                <td><span style="font-weight: 500;">${statusExibido}</span></td>
                                <td>${localExibido}</td>
                                <td>${patrimônioExibido}</td>
                                <td>${codigoBarrasExibido}</td>
                                <td class="no-print">
                                    <button class="btn btn-sec" style="padding: 2px 8px; font-size: 13px; background-color: #2980b9;" onclick="editItem('${id}', '${item.nome}', '${statusExibido}', '${localExibido}', '${patrimônioExibido}', '${codigoBarrasExibido}')">✏️</button>
                                    <button class="btn btn-sec" style="padding: 2px 8px; font-size: 13px; background-color: #c0392b;" onclick="deleteItem('${id}')">🗑️</button>
                                </td>
                            </tr>
                        `;
                        tbody.innerHTML += row;
                    }
                });

                if (tbody.innerHTML === "") {
                    tbody.innerHTML = "<tr><td colspan='7'>Nenhum item corresponde à pesquisa.</td></tr>";
                }
            } catch (error) {
                console.error("Erro ao carregar dados: ", error);
                tbody.innerHTML = "<tr><td colspan='7'>Erro ao carregar os dados.</td></tr>";
            }
        }

        // ==========================================
        // FUNÇÕES PARA EDITAR E EXCLUIR COM LOGS
        // ==========================================
        async function deleteItem(id) {
            if (confirm("Tem certeza que deseja excluir este item do inventário da Etec?")) {
                try {
                    const docRef = db.collection("itens").doc(id);
                    const docSnap = await docRef.get();

                    let dadosAntigos = {};
                    if (docSnap.exists) {
                        dadosAntigos = docSnap.data();
                    }

                    await db.collection('historico').add({
                        tipoOperacao: 'EXCLUSAO',
                        itemId: id,
                        patrimonio: dadosAntigos.patrimonio || 'N/A',
                        nomeItem: dadosAntigos.nome || '',
                        dadosDeletados: dadosAntigos,
                        dataHora: firebase.firestore.FieldValue.serverTimestamp()
                    });

                    await docRef.delete();

                    alert("Item removido com sucesso!");
                    loadItems();
                } catch (error) {
                    console.error("Erro ao excluir ou gerar log: ", error);
                    alert("Não foi possível excluir the item.");
                }
            }
        }

        async function editItem(id, nomeAtual, statusAtual, localAtual, patrimonioAtual, codigoBarrasAtual) {
            const novoNome = prompt("Digite o novo nome do item:", nomeAtual);
            if (novoNome === null) return;

            const novoStatus = prompt("Digite o novo status (Em uso / Condicionado / Dar baixa):", statusAtual);
            if (novoStatus === null) return;

            const novoLocal = prompt("Digite o novo local do item:", localAtual);
            if (novoLocal === null) return;

            const novoPatrimonio = prompt("Digite o novo patrimônio:", patrimonioAtual);
            if (novoPatrimonio === null) return;

            const novoCodigoBarras = prompt("Digite o novo código de barras:", codigoBarrasAtual);
            if (novoCodigoBarras === null) return;

            const dadosAntigos = {
                nome: nomeAtual,
                status: statusAtual,
                local: localAtual,
                patrimonio: patrimonioAtual,
                codigoBarras: codigoBarrasAtual
            };

            const novosDados = {
                nome: novoNome,
                status: novoStatus,
                local: novoLocal,
                patrimonio: novoPatrimonio,
                codigoBarras: novoCodigoBarras
            };

            try {
                await db.collection("itens").doc(id).update(novosDados);

                await db.collection('historico').add({
                    tipoOperacao: 'ALTERACAO',
                    itemId: id,
                    patrimonio: dadosAntigos.patrimonio || 'N/A',
                    nomeAnterior: dadosAntigos.nome || '',
                    nomeNovo: novosDados.nome || '',
                    dadosAnteriores: dadosAntigos,
                    dadosNovos: novosDados,
                    dataHora: firebase.firestore.FieldValue.serverTimestamp()
                });

                alert("Item atualizado com sucesso!");
                loadItems();
            } catch (error) {
                console.error("Erro ao atualizar ou gerar log: ", error);
                alert("Erro ao atualizar o item.");
            }
        }

        // ==========================================
        // EXPORTAÇÃO COMPLETA EM TXT (COM HISTÓRICO)
        // ==========================================
        async function exportToTXT() {
            try {
                // 1. Busca os dados dos itens
                const snapshotItens = await db.collection("itens").get();
                let txtContent = "=========================================\n";
                txtContent += "     INVENTÁRIO ETEC - RELATÓRIO COMPLETO    \n";
                txtContent += "=========================================\n\n";
                txtContent += ">> ITENS CADASTRADOS:\n";
                txtContent += "-----------------------------------------\n";

                snapshotItens.forEach(doc => {
                    const item = doc.data();
                    txtContent += `ID do Item: ${doc.id}\n`;
                    txtContent += `Nome: ${item.nome || 'N/A'}\n`;
                    txtContent += `Categoria: ${item.categoria || 'N/A'}\n`;
                    txtContent += `Status: ${item.status || 'N/A'}\n`;
                    txtContent += `Local: ${item.local || 'N/A'}\n`;
                    txtContent += `Patrimônio: ${item.patrimonio || 'N/A'}\n`;
                    txtContent += `Código de Barras: ${item.codigoBarras || 'N/A'}\n`;
                    txtContent += `Data de Cadastro: ${item.dataCadastro || 'N/A'}\n`;
                    txtContent += "-----------------------------------------\n";
                });

                // 2. Busca os dados do histórico (que agora está liberado!)
                const snapshotHistorico = await db.collection("historico").get();
                txtContent += "\n\n=========================================\n";
                txtContent += ">> HISTÓRICO DE ALTERAÇÕES E LOGS:\n";
                txtContent += "=========================================\n";

                if (snapshotHistorico.empty) {
                    txtContent += "Nenhum histórico registrado até o momento.\n";
                } else {
                    snapshotHistorico.forEach(doc => {
                        const log = doc.data();
                        let dataHoraFormatada = "N/A";
                        if (log.dataHora && typeof log.dataHora.toDate === 'function') {
                            dataHoraFormatada = log.dataHora.toDate().toLocaleString('pt-BR');
                        }

                        txtContent += `ID do Log: ${doc.id}\n`;
                        txtContent += `Operação: ${log.tipoOperacao || 'N/A'}\n`;
                        txtContent += `ID do Item Afetado: ${log.itemId || 'N/A'}\n`;
                        txtContent += `Patrimônio: ${log.patrimonio || 'N/A'}\n`;
                        txtContent += `Produto Afetado: ${log.nomeItem || log.nomeNovo || log.nomeAnterior || 'N/A'}\n`;
                        txtContent += `Data e Hora: ${dataHoraFormatada}\n`;
                        txtContent += "-----------------------------------------\n";
                    });
                }

                // 3. Cria o arquivo TXT e dispara o download nativo
                const blob = new Blob([txtContent], { type: "text/plain;charset=utf-8" });
                const link = document.createElement("a");
                link.href = URL.createObjectURL(blob);

                const dataAtual = new Date().toISOString().split('T')[0];
                link.download = `backup_inventario_etec_${dataAtual}.txt`;

                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);

            } catch (error) {
                console.error("Erro ao exportar TXT:", error);
                alert("Erro ao gerar o relatório em TXT: " + error.message);
            }
        }

        window.onload = loadItems;
    </script>
