<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Etec Ilha Solteira - Sistema de Inventário</title>
    <link rel="icon" type="image/png" href="./icoEtec.png">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    
    <style>
        :root {
            --primary-color: #b30000;
            /* Vermelho institucional Centro Paula Souza */
            --dark-color: #2c3e50;
            --light-color: #f4f6f9;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--light-color);
            color: #333;
            padding: 20px;
        }

        header {
            background-color: var(--primary-color);
            color: white;
            padding: 20px 15px;
            text-align: center;
            border-radius: 8px;
            margin-bottom: 20px;
            position: relative;
            /* Garante que o cabeçalho cresça se o texto quebrar de linha no celular */
            min-height: 80px;
        }

        /* Deixa a tabela responsiva: cria uma barra de rolagem lateral apenas na tabela se ela não couber no celular */
        .card {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
            overflow-x: auto;
            /* <-- ISSO VAI SALVAR A TABELA NO CELULAR */
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            background: white;
            min-width: 600px;
            /* Garante que a tabela mantenha a estrutura legível ao rolar de lado */
        }

        h2 {
            margin-bottom: 15px;
            color: var(--dark-color);
            border-bottom: 2px solid var(--primary-color);
            padding-bottom: 5px;
        }

        /* Formulários e Inputs */
        .form-group {
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
        }

        label {
            font-weight: bold;
            margin-bottom: 5px;
        }

        input,
        select,
        textarea {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 16px;
        }

        .btn {
            background-color: var(--primary-color);
            color: white;
            padding: 10px 15px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn:hover {
            background-color: #800000;
        }

        .btn-sec {
            background-color: var(--dark-color);
        }

        .btn-sec:hover {
            background-color: #1a252f;
        }

        .row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
        }

        /* Câmera/Scanner */
        #reader {
            width: 100%;
            max-width: 100%;
            /* Adapta ao tamanho total da caixinha no mobile */
            margin: 15px auto;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
        }

        /* Tabela de Dados */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            background: white;
        }

        th,
        td {
            border: 1px solid #ddd;
            padding: 12px;
            text-align: left;
        }

        th {
            background-color: var(--dark-color);
            color: white;
        }

        tr:nth-child(even) {
            background-color: #f9f9f9;
        }

        @media (max-width: 600px) {
            header {
                padding-top: 45px;
                /* Abre espaço no topo para o botão não cobrir o texto */
            }

            header h1 {
                font-size: 20px;
                /* Diminui um pouco a letra do título principal no celular */
            }

            header p {
                font-size: 14px;
            }

            #btnLogout {
                top: 10px !important;
                /* Move o botão para o topo superior direito no celular */
                bottom: auto !important;
                right: 10px !important;
                padding: 4px 10px !important;
                font-size: 12px !important;
            }
        }

        /* Regras de Impressão (Relatórios) */
        @media print {
            body {
                background: white;
                padding: 0;
            }

            .no-print {
                display: none !important;
            }

            .card {
                box-shadow: none;
                padding: 0;
            }

            th {
                background-color: #333 !important;
                color: white !important;
            }
        }
    </style>
</head>

<body>

    <header>
        <h1>Etec de Ilha Solteira</h1>
        <p>Sistema de Catalogação e Inventário de Bens</p>
        <button id="btnLogout" onclick="logout()" class="btn btn-sec no-print" style="
            display: none;
            position: absolute;
            right: 20px;
            bottom: 15px;
            padding: 5px 12px;
            font-size: 14px;">
            Sair
        </button>
    </header>

    <div id="loginScreen" class="card" style="max-width:400px; margin:50px auto;">
        <h2>Login do Sistema</h2>
        <div class="form-group">
            <label>E-mail</label>
            <input type="email" id="loginEmail">
        </div>
        <div class="form-group">
            <label>Senha</label>
            <input type="password" id="loginPassword">
        </div>
        <button class="btn" onclick="login()">
            Entrar
        </button>
    </div>

    <div class="container" id="mainSystem" style="display:none;">

        <div class="card no-print">
            <h2>Cadastrar Novo Item</h2>
            <form id="itemForm">
                <div class="row">
                    <div class="form-group">
                        <label for="itemName">Nome do Item/Produto*</label>
                        <input type="text" id="itemName" required placeholder="Ex: Monitor Dell 24'">
                    </div>
                    <div class="form-group">
                        <label for="itemCategory">Categoria*</label>
                        <select id="itemCategory" required>
                            <option value="">Selecione...</option>
                            <option value="Informática">Informática</option>
                            <option value="Mobiliário">Mobiliário</option>
                            <option value="Eletrodomésticos">Eletrodomésticos</option>
                            <option value="Outros">Outros</option>
                        </select>
                    </div>
                </div>

                <div class="row" style="margin-top: 10px;">
                    <div class="form-group">
                        <label style="flex-direction: row; gap: 10px; cursor: pointer;">
                            <input type="checkbox" id="hasPatrimony" onchange="togglePatrimonyFields()"> Possui
                            Patrimônio / Código de Barras?
                        </label>
                    </div>
                </div>

                <div id="patrimonyFields" class="row" style="display: none;">
                    <div class="form-group">
                        <label for="patrimonyCode">Número do Patrimônio</label>
                        <input type="text" id="patrimonyCode" placeholder="Ex: ETEC-065-4321">
                    </div>
                    <div class="form-group">
                        <label for="barcode">Código de Barras</label>
                        <div style="display: flex; gap: 5px;">
                            <input type="text" id="barcode" style="flex: 1;"
                                placeholder="Aproxime o leitor ou use a câmera">
                            <button type="button" class="btn btn-sec" onclick="startScanner()">📷 Ler</button>
                        </div>
                    </div>
                </div>

                <div id="reader" style="display: none;"></div>

                <div class="form-group" style="margin-top: 15px;">
                    <button type="submit" class="btn">Salvar Item no Banco de Dados</button>
                </div>
            </form>
        </div>

        <div class="card">
            <h2 class="no-print">Consulta de Itens e Relatórios</h2>

            <div class="row no-print" style="margin-bottom: 20px;">
                <div class="form-group">
                    <label for="searchQuery">Pesquisar por Nome ou Código de Barras</label>
                    <input type="text" id="searchQuery" oninput="loadItems()" placeholder="Digite para buscar...">
                </div>
                <div class="form-group">
                    <label for="filterCategory">Filtrar por Categoria</label>
                    <select id="filterCategory" onchange="loadItems()">
                        <option value="">Todas</option>
                        <option value="Informática">Informática</option>
                        <option value="Mobiliário">Mobiliário</option>
                        <option value="Eletrodomésticos">Eletrodomésticos</option>
                        <option value="Outros">Outros</option>
                    </select>
                </div>
                <div class="form-group" style="justify-content: flex-end; flex-direction: row; gap: 10px;">
                    <button class="btn btn-sec" onclick="window.print()">🖨️ Imprimir Relatório</button>
                    <button class="btn btn-sec" style="background-color: #27ae60;" onclick="exportBackup()">💾 Exportar
                        Backup</button>
                </div>
            </div>

            <table id="itemsTable">
                <thead>
                    <tr>
                        <th>Item/Produto</th>
                        <th>Categoria</th>
                        <th>Patrimônio</th>
                        <th>Código de Barras</th>
                        <th class="no-print">Ações</th>
                    </tr>
                </thead>
                <tbody id="itemsTableBody">
                </tbody>
            </table>
        </div>

    </div>

    <script>
        // ==========================================
        // CONFIGURAÇÃO DO FIREBASE
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyB9HtjLT4gGhCOV4RsFQ2cPipW6Y53kcug",
            authDomain: "sistemaescola-f74c2.firebaseapp.com",
            projectId: "sistemaescola-f74c2",
            storageBucket: "sistemaescola-f74c2.firebasestorage.app",
            messagingSenderId: "328152429744",
            appId: "1:328152429744:web:8a0b7985be8c9e25cd3775"
        };

        // Inicializa o Firebase
        firebase.initializeApp(firebaseConfig);

        const db = firebase.firestore();
        const auth = firebase.auth();

        let html5QrcodeScanner = null;

        // ==========================================
        // LOGIN
        // ==========================================
        async function login() {
            const email = document.getElementById("loginEmail").value;
            const password = document.getElementById("loginPassword").value;

            try {
                await auth.signInWithEmailAndPassword(email, password);
            } catch (error) {
                alert("Erro ao entrar:\n\n" + error.message);
            }
        }

        document.addEventListener("keydown", function (event) {
            if (event.key === "Enter") {
                const loginScreen = document.getElementById("loginScreen");
                if (loginScreen.style.display !== "none") {
                    login();
                }
            }
        });

        function logout() {
            auth.signOut();
        }

        // Mostrar/Ocultar campos de patrimônio
        function togglePatrimonyFields() {
            const hasPatrimony = document.getElementById('hasPatrimony').checked;
            document.getElementById('patrimonyFields').style.display = hasPatrimony ? 'grid' : 'none';
        }

        // ==========================================
        // LÓGICA DO SCANNER DE CÓDIGO DE BARRAS
        // ==========================================
        // Declarado fora da função para manter o escopo global/módulo
        

        async function startScanner() {
            const readerElement = document.getElementById('reader');
            readerElement.style.display = 'block';

            // 1. Correção Assíncrona: Espera o scanner antigo fechar de verdade antes de prosseguir
            if (html5QrcodeScanner) {
                try {
                    await html5QrcodeScanner.clear();
                } catch (err) {
                    console.warn("Erro ao limpar scanner anterior:", err);
                }
            }

            html5QrcodeScanner = new Html5QrcodeScanner("reader", {
                fps: 20,
                qrbox: function (viewfinderWidth, viewfinderHeight) {
                    // Melhoria: Proporção dinâmica adaptável (mantém fino, mas funcional em celulares)
                    const width = Math.min(viewfinderWidth * 0.85, 400);
                    const height = Math.min(viewfinderHeight * 0.25, 100);
                    return { width, height };
                },
                rememberLastUsedCamera: true,
                formatsToSupport: [
                    Html5QrcodeSupportedFormats.CODE_128,
                    Html5QrcodeSupportedFormats.CODE_39,
                    Html5QrcodeSupportedFormats.EAN_13,
                    Html5QrcodeSupportedFormats.EAN_8,
                    Html5QrcodeSupportedFormats.UPC_A,
                    Html5QrcodeSupportedFormats.ITF
                ],
                experimentalFeatures: {
                    useBarCodeDetectorIfSupported: true
                }
            });

            html5QrcodeScanner.render(async (decodedText) => {
                // 2. Feedback sonoro otimizado
                tocarBip();

                // Preenche os campos do formulário
                document.getElementById('barcode').value = decodedText;
                document.getElementById('searchQuery').value = decodedText;

                // 3. Fecha a câmera com segurança antes de buscar no Firebase
                try {
                    await html5QrcodeScanner.clear();
                    readerElement.style.display = 'none';
                } catch (err) {
                    console.error("Erro ao fechar a câmera:", err);
                }

                // Executa a busca no Firebase depois que a interface/câmera já foi liberada
                loadItems();

            }, (error) => {
                // Ignora erros de varredura contínua
            });
        }

        // Função auxiliar isolada para o Bip (evita vazamento de memória e travamento de áudio)
        function tocarBip() {
            try {
                const AudioCtx = window.AudioContext || window.webkitAudioContext;
                if (!AudioCtx) return;

                const context = new AudioCtx();
                const osc = context.createOscillator();
                const gain = context.createGain(); // Controle de volume opcional

                osc.type = "sine";
                osc.frequency.setValueAtTime(1200, context.currentTime);

                // Suaviza o estalo do áudio no final
                gain.gain.setValueAtTime(0.1, context.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, context.currentTime + 0.08);

                osc.connect(gain);
                gain.connect(context.destination);

                osc.start();
                osc.stop(context.currentTime + 0.08);
            } catch (e) {
                console.log("Áudio bloqueado pelo navegador ou não suportado.");
            }
        }

        // ==========================================
        // SALVAR ITEM NO FIRESTORE (CREATE)
        // ==========================================
        document.getElementById('itemForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const nome = document.getElementById('itemName').value;
            const categoria = document.getElementById('itemCategory').value;
            const temPatrimonio = document.getElementById('hasPatrimony').checked;
            const patrimonio = temPatrimonio ? document.getElementById('patrimonyCode').value : "N/A";
            const codigoBarras = temPatrimonio ? document.getElementById('barcode').value : "N/A";

            try {
                await db.collection("itens").add({
                    nome: nome,
                    categoria: categoria,
                    temPatrimonio: temPatrimonio,
                    patrimonio: patrimonio,
                    codigoBarras: codigoBarras,
                    dataCadastro: new Date().toISOString().split('T')[0]
                });

                alert("Item catalogado com sucesso!");
                document.getElementById('itemForm').reset();
                togglePatrimonyFields();
                loadItems();
            } catch (error) {
                console.error(error);
                alert("Erro: " + error.code + "\n\n" + error.message);
            }
        });

        // ==========================================
        // RECUPERAR E FILTRAR ITENS (READ & SEARCH)
        // ==========================================
        async function loadItems() {
            const queryText = document.getElementById('searchQuery').value.toLowerCase();
            const filterCategory = document.getElementById('filterCategory').value;
            const tbody = document.getElementById('itemsTableBody');
            tbody.innerHTML = "<tr><td colspan='5'>Carregando itens...</td></tr>";

            try {
                let reference = db.collection("itens");

                if (filterCategory) {
                    reference = reference.where("categoria", "==", filterCategory);
                }

                const snapshot = await reference.get();
                tbody.innerHTML = "";

                if (snapshot.empty) {
                    tbody.innerHTML = "<tr><td colspan='5'>Nenhum item cadastrado ou encontrado.</td></tr>";
                    return;
                }

                snapshot.forEach(doc => {
                    const item = doc.data();
                    const id = doc.id;

                    if (item.nome.toLowerCase().includes(queryText) ||
                        item.patrimonio.toLowerCase().includes(queryText) ||
                        item.codigoBarras.toLowerCase().includes(queryText)) {

                        const row = `
                            <tr>
                                <td><b>${item.nome}</b></td>
                                <td>${item.categoria}</td>
                                <td>${item.patrimonio}</td>
                                <td>${item.codigoBarras}</td>
                                <td class="no-print">
                                    <button class="btn btn-sec" style="padding: 2px 8px; font-size: 13px; background-color: #2980b9;" onclick="editItem('${id}', '${item.nome}', '${item.categoria}', '${item.patrimonio}', '${item.codigoBarras}')">✏️</button>
                                    <button class="btn btn-sec" style="padding: 2px 8px; font-size: 13px; background-color: #c0392b;" onclick="deleteItem('${id}')">🗑️</button>
                                </td>
                            </tr>
                        `;
                        tbody.innerHTML += row;
                    }
                });
            } catch (error) {
                console.error("Erro ao carregar dados: ", error);
                tbody.innerHTML = "<tr><td colspan='5'>Erro ao carregar os dados.</td></tr>";
            }
        }

        // ==========================================
        // FUNÇÕES PARA EDITAR E EXCLUIR (UPDATE & DELETE)
        // ==========================================
        async function deleteItem(id) {
            if (confirm("Tem certeza que deseja excluir este item do inventário da Etec?")) {
                try {
                    await db.collection("itens").doc(id).delete();
                    alert("Item removido com sucesso!");
                    loadItems();
                } catch (error) {
                    console.error("Erro ao excluir: ", error);
                    alert("Não foi possível excluir o item.");
                }
            }
        }

        async function editItem(id, nomeAtual, categoryAtual, patrimonioAtual, codigoBarrasAtual) {
            const novoNome = prompt("Digite o novo nome do item:", nomeAtual);
            if (novoNome === null) return;

            const novoPatrimonio = prompt("Digite o novo patrimônio:", patrimonioAtual);
            if (novoPatrimonio === null) return;

            const novoCodigoBarras = prompt("Digite o novo código de barras:", codigoBarrasAtual);
            if (novoCodigoBarras === null) return;

            try {
                await db.collection("itens").doc(id).update({
                    nome: novoNome,
                    patrimonio: novoPatrimonio,
                    codigoBarras: novoCodigoBarras
                });

                alert("Item atualizado com sucesso!");
                loadItems();
            } catch (error) {
                console.error("Erro ao atualizar: ", error);
                alert("Erro ao atualizar o item.");
            }
        }

        // ==========================================
        // FUNÇÃO DE BACKUP (DOWNLOAD JSON)
        // ==========================================
        async function exportBackup() {
            try {
                const snapshot = await db.collection("itens").get();
                const dados = [];
                snapshot.forEach(doc => dados.push({ id: doc.id, ...doc.data() }));

                const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(dados, null, 2));
                const downloadAnchor = document.createElement('a');
                downloadAnchor.setAttribute("href", dataStr);
                downloadAnchor.setAttribute("download", `backup_inventario_etec_${new Date().toISOString().split('T')[0]}.json`);
                document.body.appendChild(downloadAnchor);
                downloadAnchor.click();
                downloadAnchor.remove();
            } catch (error) {
                alert("Falha ao gerar arquivo de backup.");
            }
        }

        // Escutador do Estado de Login
        auth.onAuthStateChanged((user) => {
            if (user) {
                document.getElementById("loginScreen").style.display = "none";
                document.getElementById("mainSystem").style.display = "block";
                document.getElementById("btnLogout").style.display = "block";
                loadItems();
            } else {
                document.getElementById("loginScreen").style.display = "block";
                document.getElementById("mainSystem").style.display = "none";
                document.getElementById("btnLogout").style.display = "none";
            }
        });

        // Inicializar a tabela ao carregar a página
        window.onload = loadItems;
    </script>
</body>

</html>
